# Credora Hyperledger Fabric Network — Docker Compose
# Starts: 1 Orderer, 3 Peers (one per org), 3 CAs, 3 CouchDB instances, 1 CLI
version: '3.7'

networks:
  credora-network:
    name: credora-network

volumes:
  orderer.credora.com:
  peer0.government.credora.com:
  peer0.university.credora.com:
  peer0.verifier.credora.com:
  couchdb.government:
  couchdb.university:
  couchdb.verifier:

services:
  # ── Certificate Authorities ──────────────────────────────────────────────────

  ca.government.credora.com:
    image: hyperledger/fabric-ca:latest
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-government
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organizations/org1-government/ca:/etc/hyperledger/fabric-ca-server
    container_name: ca.government.credora.com
    networks:
      - credora-network

  ca.university.credora.com:
    image: hyperledger/fabric-ca:latest
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-university
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organizations/org2-universities/ca:/etc/hyperledger/fabric-ca-server
    container_name: ca.university.credora.com
    networks:
      - credora-network

  ca.verifier.credora.com:
    image: hyperledger/fabric-ca:latest
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-verifier
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
    ports:
      - "9054:9054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./organizations/org3-verifiers/ca:/etc/hyperledger/fabric-ca-server
    container_name: ca.verifier.credora.com
    networks:
      - credora-network

  # ── Orderer (RAFT Consensus) ─────────────────────────────────────────────────

  orderer.credora.com:
    image: hyperledger/fabric-orderer:latest
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.credora.com:9443
      - ORDERER_METRICS_PROVIDER=prometheus
    working_dir: /root
    command: orderer
    volumes:
      - ./organizations/orderer/msp:/var/hyperledger/orderer/msp
      - ./organizations/orderer/tls:/var/hyperledger/orderer/tls
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - orderer.credora.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
      - "9443:9443"
    container_name: orderer.credora.com
    networks:
      - credora-network

  # ── CouchDB instances (for rich queries) ────────────────────────────────────

  couchdb.government:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb.government:/opt/couchdb/data
    container_name: couchdb.government
    networks:
      - credora-network

  couchdb.university:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    volumes:
      - couchdb.university:/opt/couchdb/data
    container_name: couchdb.university
    networks:
      - credora-network

  couchdb.verifier:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    volumes:
      - couchdb.verifier:/opt/couchdb/data
    container_name: couchdb.verifier
    networks:
      - credora-network

  # ── Peer Nodes ───────────────────────────────────────────────────────────────

  peer0.government.credora.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=credora-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.government.credora.com
      - CORE_PEER_ADDRESS=peer0.government.credora.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.government.credora.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.government.credora.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.government.credora.com:7051
      - CORE_PEER_LOCALMSPID=GovernmentMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.government.credora.com:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.government:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/org1-government/peers/peer0/msp:/etc/hyperledger/fabric/msp
      - ./organizations/org1-government/peers/peer0/tls:/etc/hyperledger/fabric/tls
      - peer0.government.credora.com:/var/hyperledger/production
    depends_on:
      - couchdb.government
    ports:
      - "7051:7051"
      - "9444:9444"
    container_name: peer0.government.credora.com
    networks:
      - credora-network

  peer0.university.credora.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=credora-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.university.credora.com
      - CORE_PEER_ADDRESS=peer0.university.credora.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.university.credora.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.university.credora.com:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.university.credora.com:9051
      - CORE_PEER_LOCALMSPID=UniversityMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.university.credora.com:9445
      - CORE_METRICS_PROVIDER=prometheus
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.university:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/org2-universities/peers/peer0/msp:/etc/hyperledger/fabric/msp
      - ./organizations/org2-universities/peers/peer0/tls:/etc/hyperledger/fabric/tls
      - peer0.university.credora.com:/var/hyperledger/production
    depends_on:
      - couchdb.university
    ports:
      - "9051:9051"
      - "9445:9445"
    container_name: peer0.university.credora.com
    networks:
      - credora-network

  peer0.verifier.credora.com:
    image: hyperledger/fabric-peer:latest
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=credora-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.verifier.credora.com
      - CORE_PEER_ADDRESS=peer0.verifier.credora.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.verifier.credora.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.verifier.credora.com:11051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.verifier.credora.com:11051
      - CORE_PEER_LOCALMSPID=VerifierMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.verifier.credora.com:9446
      - CORE_METRICS_PROVIDER=prometheus
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.verifier:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/org3-verifiers/peers/peer0/msp:/etc/hyperledger/fabric/msp
      - ./organizations/org3-verifiers/peers/peer0/tls:/etc/hyperledger/fabric/tls
      - peer0.verifier.credora.com:/var/hyperledger/production
    depends_on:
      - couchdb.verifier
    ports:
      - "11051:11051"
      - "9446:9446"
    container_name: peer0.verifier.credora.com
    networks:
      - credora-network

  # ── CLI Admin Container ──────────────────────────────────────────────────────

  cli:
    image: hyperledger/fabric-tools:latest
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      # Default to Government org for admin ops
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.government.credora.com:7051
      - CORE_PEER_LOCALMSPID=GovernmentMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/credora/crypto-config/peerOrganizations/government.credora.com/peers/peer0.government.credora.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/credora/crypto-config/peerOrganizations/government.credora.com/peers/peer0.government.credora.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/credora/crypto-config/peerOrganizations/government.credora.com/peers/peer0.government.credora.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/credora/crypto-config/peerOrganizations/government.credora.com/users/Admin@government.credora.com/msp
    working_dir: /opt/gopath/src/github.com/credora
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations:/opt/gopath/src/github.com/credora/crypto-config
      - ./channel-artifacts:/opt/gopath/src/github.com/credora/channel-artifacts
      - ../chaincode:/opt/gopath/src/chaincode
    depends_on:
      - peer0.government.credora.com
      - peer0.university.credora.com
      - peer0.verifier.credora.com
    container_name: cli
    networks:
      - credora-network
